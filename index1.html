<input type="text" id="pickup" placeholder="Pickup Location" required><br>
<input type="text" id="drop" placeholder="Drop Location" required><br>
<input type="tel" id="mobile" placeholder="Mobile Number" required><br>

<button class="btn" onclick="sendWhatsApp()">Book via WhatsApp</button>

<script>
function sendWhatsApp() {
  var pickup = document.getElementById("pickup").value;
  var drop = document.getElementById("drop").value;
  var mobile = document.getElementById("mobile").value;

  var message = "🚖 Go Luck Cab Booking:%0A"
              + "Pickup: " + pickup + "%0A"
              + "Drop: " + drop + "%0A"
              + "Mobile: " + mobile;

  var url = "https://wa.me/916392860640?text=" + message;

  window.open(url, "_blank");
}
</script>
